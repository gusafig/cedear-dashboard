<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>CEDEAR Dashboard · BYMA</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--bg4:#2d333b;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.15);
  --text:#e6edf3;--text2:#8b949e;--text3:#484f58;
  --blue:#58a6ff;--blue2:rgba(88,166,255,0.12);
  --green:#3fb950;--green2:rgba(63,185,80,0.12);
  --red:#f85149;--red2:rgba(248,81,73,0.12);
  --yellow:#d29922;--yellow2:rgba(210,153,34,0.12);
  --purple:#bc8cff;--purple2:rgba(188,140,255,0.12);
  --radius:8px;--radius-lg:12px;
}
html{font-size:14px;font-family:'Inter',system-ui,sans-serif}
body{background:var(--bg);color:var(--text);min-height:100vh}

/* ── Layout ── */
.shell{max-width:1440px;margin:0 auto;padding:1.25rem 1rem}

/* ── Header ── */
.hdr{display:flex;align-items:flex-start;justify-content:space-between;
     flex-wrap:wrap;gap:.75rem;margin-bottom:1.25rem}
.hdr-title h1{font-size:1.2rem;font-weight:600;letter-spacing:-.02em}
.hdr-title p{font-size:.78rem;color:var(--text2);margin-top:2px}
.hdr-right{display:flex;align-items:center;gap:.5rem;flex-wrap:wrap}
.pill{font-size:.7rem;font-weight:500;padding:3px 8px;border-radius:99px;
      display:inline-flex;align-items:center;gap:4px;border:1px solid}
.pill-green{color:var(--green);background:var(--green2);border-color:rgba(63,185,80,.3)}
.pill-blue{color:var(--blue);background:var(--blue2);border-color:rgba(88,166,255,.3)}
.pill-yellow{color:var(--yellow);background:var(--yellow2);border-color:rgba(210,153,34,.3)}
.dot{width:5px;height:5px;border-radius:50%;background:currentColor}

/* ── CCL banner ── */
.ccl-bar{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);
          padding:8px 14px;margin-bottom:1.25rem;display:flex;align-items:center;
          gap:1.5rem;flex-wrap:wrap;font-size:.8rem;color:var(--text2)}
.ccl-bar strong{color:var(--text)}

/* ── Controles ── */
.controls{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:1rem;align-items:center}
.controls input,.controls select{
  background:var(--bg2);border:1px solid var(--border2);color:var(--text);
  border-radius:var(--radius);padding:6px 10px;font-size:.8rem;outline:none}
.controls input{min-width:200px}
.controls input:focus,.controls select:focus{border-color:var(--blue)}
.controls select option{background:var(--bg2)}

/* ── Tabs sector ── */
.tabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:1rem}
.tab{background:var(--bg2);border:1px solid var(--border);color:var(--text2);
     padding:4px 12px;border-radius:99px;font-size:.75rem;cursor:pointer;transition:all .15s}
.tab:hover{border-color:var(--border2);color:var(--text)}
.tab.active{background:var(--blue2);border-color:rgba(88,166,255,.4);color:var(--blue);font-weight:500}

/* ── Ticker grid ── */
.ticker-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));
              gap:7px;margin-bottom:1.5rem}
.tc{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);
    padding:10px 12px;cursor:pointer;transition:all .15s;user-select:none;position:relative}
.tc:hover{border-color:var(--border2);background:var(--bg3)}
.tc.sel{border-color:var(--blue);background:var(--bg3)}
.tc.rsi-green{border-left:3px solid var(--green)}
.tc.rsi-red{border-left:3px solid var(--red)}
.tc-sym{font-size:.9rem;font-weight:600;letter-spacing:-.01em}
.tc-name{font-size:.68rem;color:var(--text3);margin:1px 0 5px;
          white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tc-price{font-size:.8rem;font-weight:500}
.tc-pct{font-size:.75rem;font-weight:500;margin-top:1px}
.up{color:var(--green)} .dn{color:var(--red)} .flat{color:var(--text2)}
.tc-badges{display:flex;gap:3px;flex-wrap:wrap;margin-top:5px}
.badge{font-size:.58rem;font-weight:700;padding:1px 5px;border-radius:99px;letter-spacing:.02em}
.badge-sell{color:var(--red);background:var(--red2)}
.badge-buy{color:var(--green);background:var(--green2)}
.badge-purple{color:var(--purple);background:var(--purple2)}

/* ── View nav ── */
.view-nav{display:flex;gap:4px;margin-bottom:1rem}
.vnav{background:var(--bg2);border:1px solid var(--border);color:var(--text2);
  padding:5px 14px;border-radius:99px;font-size:.78rem;cursor:pointer;transition:all .15s}
.vnav:hover{border-color:var(--border2);color:var(--text)}
.vnav.active{background:var(--blue2);border-color:rgba(88,166,255,.4);color:var(--blue);font-weight:500}

/* ── Pantalla señales ── */
.signals-wrap{margin-bottom:1.5rem}
.signals-table{width:100%;border-collapse:collapse;font-size:.78rem}
.signals-table th{text-align:left;padding:7px 10px;color:var(--text3);
  font-size:.65rem;text-transform:uppercase;letter-spacing:.05em;
  border-bottom:1px solid var(--border);font-weight:500}
.signals-table td{padding:7px 10px;border-bottom:1px solid var(--border);vertical-align:middle}
.signals-table tr:hover td{background:var(--bg3);cursor:pointer}
.score-bar{display:flex;align-items:center;gap:6px}
.score-dots{display:flex;gap:3px}
.score-dot{width:8px;height:8px;border-radius:50%;background:var(--border2)}
.score-dot.on-buy{background:var(--green)}
.score-dot.on-sell{background:var(--red)}
.signals-tabs{display:flex;gap:4px;margin-bottom:.75rem}
.stab{background:var(--bg2);border:1px solid var(--border);color:var(--text2);
  padding:4px 12px;border-radius:99px;font-size:.75rem;cursor:pointer;transition:all .15s}
.stab.active{background:var(--green2);border-color:rgba(63,185,80,.4);color:var(--green);font-weight:500}
.stab.active-sell{background:var(--red2);border-color:rgba(248,81,73,.4);color:var(--red);font-weight:500}

/* ── Panel detalle ── */
.detail{background:var(--bg2);border:1px solid var(--border);
         border-radius:var(--radius-lg);padding:1.25rem;margin-bottom:1.5rem}
.d-head{display:flex;justify-content:space-between;align-items:flex-start;
         flex-wrap:wrap;gap:.75rem;margin-bottom:1rem}
.d-sym{font-size:1.5rem;font-weight:700;letter-spacing:-.03em}
.d-name{font-size:.8rem;color:var(--text2);margin-top:2px}
.d-price{text-align:right}
.d-usd{font-size:1.5rem;font-weight:600}
.d-ars{font-size:.78rem;color:var(--text2);margin-top:2px}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(105px,1fr));
        gap:7px;margin-bottom:1.1rem}
.stat{background:var(--bg3);border-radius:var(--radius);padding:9px 11px}
.stat-lbl{font-size:.65rem;color:var(--text3);text-transform:uppercase;
           letter-spacing:.05em;margin-bottom:3px}
.stat-val{font-size:.9rem;font-weight:500}

/* Chart */
.chart-section{margin-bottom:1.1rem}
.section-lbl{font-size:.72rem;color:var(--text2);margin-bottom:.5rem;
              text-transform:uppercase;letter-spacing:.05em}
.chart-wrap{position:relative;width:100%;height:200px}

/* Indicadores */
.ind-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(195px,1fr));gap:7px}
.ind{background:var(--bg3);border-radius:var(--radius);padding:11px 13px}
.ind-lbl{font-size:.65rem;color:var(--text3);text-transform:uppercase;
          letter-spacing:.05em;margin-bottom:5px}
.ind-big{font-size:1.2rem;font-weight:600;margin-bottom:3px}
.ind-bar-bg{height:3px;background:var(--bg4);border-radius:2px;margin-bottom:5px;overflow:hidden}
.ind-bar-fill{height:3px;border-radius:2px;transition:width .3s}
.ind-row{display:flex;justify-content:space-between;font-size:.76rem;
          color:var(--text2);margin-bottom:3px}
.ind-row span:last-child{font-weight:500;color:var(--text)}
.sig{font-size:.68rem;font-weight:600;padding:2px 7px;border-radius:99px;display:inline-block}
.sig-buy{color:var(--green);background:var(--green2)}
.sig-sell{color:var(--red);background:var(--red2)}
.sig-neutral{color:var(--yellow);background:var(--yellow2)}

/* Footer */
.footer{text-align:center;font-size:.72rem;color:var(--text3);padding:1.5rem 0 .5rem}
.footer a{color:var(--text3)}

/* Loader */
.loader{text-align:center;padding:4rem 0;color:var(--text2)}
.spin{display:inline-block;width:26px;height:26px;border:2px solid var(--border2);
       border-top-color:var(--blue);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:.75rem}
@keyframes spin{to{transform:rotate(360deg)}}
.err{background:var(--red2);border:1px solid rgba(248,81,73,.3);border-radius:var(--radius);
      padding:1rem 1.25rem;color:var(--red);font-size:.85rem;margin-bottom:1rem}

@media(max-width:600px){
  .ticker-grid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr))}
  .detail{padding:.9rem}
}
</style>
</head>
<body>
<div class="shell">

  <header class="hdr">
    <div class="hdr-title">
      <h1>CEDEAR Dashboard</h1>
      <p>NYSE · NASDAQ · BYMA · Datos: Yahoo Finance</p>
    </div>
    <div class="hdr-right" id="hdr-right">
      <span class="pill pill-yellow"><span class="dot"></span>Cargando…</span>
    </div>
  </header>

  <div class="ccl-bar" id="ccl-bar">
    <span>TC CCL: <strong id="ccl-val">—</strong> ARS/USD</span>
    <span>Compra: <strong id="ccl-compra">—</strong></span>
    <span>Venta: <strong id="ccl-venta">—</strong></span>
    <span id="ccl-fecha" style="margin-left:auto;font-size:.72rem"></span>
  </div>

  <div class="err" id="err-box" style="display:none"></div>

  <div class="controls">
    <input id="search" type="text" placeholder="Buscar ticker o empresa…" oninput="applyFilters()"/>
    <select id="sort-sel" onchange="applyFilters()">
      <option value="sym">A – Z</option>
      <option value="pct_desc">Mayor variación +</option>
      <option value="pct_asc">Mayor variación −</option>
      <option value="rsi_asc">RSI menor (sobreventa)</option>
      <option value="rsi_desc">RSI mayor (sobrecompra)</option>
      <option value="price_desc">Precio USD ↓</option>
      <option value="price_asc">Precio USD ↑</option>
    </select>
    <select id="sector-sel" onchange="filterBySector()">
      <option value="">Todos los sectores</option>
    </select>
  </div>

  <!-- Navegación de vistas -->
  <div class="view-nav">
    <button class="vnav active" id="vnav-grid"    onclick="switchView('grid')">📊 Dashboard</button>
    <button class="vnav"        id="vnav-signals" onclick="switchView('signals')">🎯 Señales</button>
  </div>

  <div id="view-grid">
    <div class="tabs" id="tabs"></div>
    <div class="loader" id="loader">
      <div class="spin"></div>
      <p>Cargando datos de mercado…</p>
    </div>
    <div class="ticker-grid" id="ticker-grid" style="display:none"></div>
    <div class="detail"       id="detail"      style="display:none"></div>
  </div>

  <div id="view-signals" style="display:none">
    <div class="signals-wrap">
      <div class="signals-tabs">
        <button class="stab active" id="stab-buy"  onclick="filterSignals('buy')">▲ Compra / Sobreventa</button>
        <button class="stab"        id="stab-sell" onclick="filterSignals('sell')">▼ Venta / Sobrecompra</button>
        <button class="stab"        id="stab-all"  onclick="filterSignals('all')">Todos</button>
      </div>
      <div id="signals-table-wrap"></div>
    </div>
  </div>

  <footer class="footer">
    Datos: <a href="https://finance.yahoo.com" target="_blank">Yahoo Finance</a> via yfinance ·
    TC CCL: <a href="https://dolarapi.com" target="_blank">dolarapi.com</a> ·
    Actualización automática lunes a viernes · Solo referencial, no asesoramiento financiero
  </footer>
</div>

<script>
// ── Estado ────────────────────────────────────────────────────────────────────
let MARKET = {};
let SEL    = null;
let SECTOR = '';
let CCL    = 1050;
let chart  = null;

const SECTOR_LABEL = {
  '':'Todos', tech:'Tecnología', finance:'Finanzas', energy:'Energía',
  consumer:'Consumo', health:'Salud', industrial:'Industrial',
  mining:'Minería', brasil:'Brasil', china:'China', mexico:'México',
  etf:'ETFs', crypto:'Crypto'
};

const DATA_URL = 'data/market_data.json';

// ── Arranque ──────────────────────────────────────────────────────────────────
async function boot() {
  await loadCCL();
  await loadMarket();
}

async function loadCCL() {
  try {
    const r = await fetch('https://dolarapi.com/v1/dolares/contadoconliqui');
    if (!r.ok) return;
    const d = await r.json();
    const mid = ((d.compra || 0) + (d.venta || 0)) / 2;
    CCL = mid || CCL;
    document.getElementById('ccl-val').textContent     = CCL.toFixed(0);
    document.getElementById('ccl-compra').textContent  = (d.compra||'—').toString();
    document.getElementById('ccl-venta').textContent   = (d.venta||'—').toString();
    const f = d.fechaActualizacion ? new Date(d.fechaActualizacion).toLocaleString('es-AR') : '';
    document.getElementById('ccl-fecha').textContent = f ? 'Act. ' + f : '';
  } catch(_) {}
}

async function loadMarket() {
  try {
    const r = await fetch(DATA_URL + '?t=' + Date.now());
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const json = await r.json();
    MARKET = json.tickers || {};

    if (!Object.keys(MARKET).length) throw new Error('Sin datos — ejecutá el workflow primero');

    const updAt = json.updated_at_baires || '';
    document.getElementById('hdr-right').innerHTML = `
      <span class="pill pill-green"><span class="dot"></span>NYSE/NASDAQ</span>
      <span class="pill pill-blue"><span class="dot"></span>BYMA</span>
      <span class="pill pill-yellow">Act. ${updAt} hs · ${json.total||0} tickers</span>
    `;

    buildTabs();
    buildSectorSelect();
    applyFilters();

    document.getElementById('loader').style.display      = 'none';
    document.getElementById('ticker-grid').style.display = 'grid';

    const first = Object.keys(MARKET)[0];
    if (first) selectTicker(first);

  } catch(e) {
    document.getElementById('loader').style.display = 'none';
    const box = document.getElementById('err-box');
    box.style.display = 'block';
    box.textContent = 'Error al cargar datos: ' + e.message;
  }
}

// ── Tabs ──────────────────────────────────────────────────────────────────────
function buildTabs() {
  const sectors = [...new Set(Object.values(MARKET).map(d => d.sector))];
  const keys    = ['', ...Object.keys(SECTOR_LABEL).filter(k => k && sectors.includes(k))];
  const wrap    = document.getElementById('tabs');
  wrap.innerHTML = '';
  keys.forEach(k => {
    if (!(k in SECTOR_LABEL)) return;
    const b = document.createElement('button');
    b.className = 'tab' + (k === SECTOR ? ' active' : '');
    b.textContent = SECTOR_LABEL[k];
    b.onclick = () => { SECTOR = k; buildTabs(); applyFilters(); };
    wrap.appendChild(b);
  });
}

function buildSectorSelect() {
  const sel     = document.getElementById('sector-sel');
  const sectors = [...new Set(Object.values(MARKET).map(d => d.sector))].sort();
  sectors.forEach(s => {
    const o = document.createElement('option');
    o.value = s; o.textContent = SECTOR_LABEL[s] || s;
    sel.appendChild(o);
  });
}

function filterBySector() {
  SECTOR = document.getElementById('sector-sel').value;
  buildTabs();
  applyFilters();
}

// ── Grid ──────────────────────────────────────────────────────────────────────
function applyFilters() {
  const q  = document.getElementById('search').value.toLowerCase();
  const by = document.getElementById('sort-sel').value;

  let items = Object.values(MARKET).filter(d => {
    const secOk = !SECTOR || d.sector === SECTOR;
    const srOk  = !q || d.symbol.toLowerCase().includes(q) || d.name.toLowerCase().includes(q);
    return secOk && srOk;
  });

  items.sort((a, b) => {
    if (by === 'sym')       return a.symbol.localeCompare(b.symbol);
    if (by === 'pct_desc')  return b.change_pct - a.change_pct;
    if (by === 'pct_asc')   return a.change_pct - b.change_pct;
    if (by === 'rsi_asc')   return (a.rsi ?? 999) - (b.rsi ?? 999);
    if (by === 'rsi_desc')  return (b.rsi ?? -1)  - (a.rsi ?? -1);
    if (by === 'price_desc')return b.price_usd - a.price_usd;
    if (by === 'price_asc') return a.price_usd - b.price_usd;
    return 0;
  });

  const grid = document.getElementById('ticker-grid');
  grid.innerHTML = '';
  items.forEach(d => {
    const up   = d.change_pct > 0, dn = d.change_pct < 0;
    const cls  = up ? 'up' : dn ? 'dn' : 'flat';
    const sign = up ? '+' : '';
    const el   = document.createElement('div');

    // Semáforo RSI: borde izquierdo verde (sobreventa) o rojo (sobrecompra)
    const rsiEdge = d.rsi !== null && d.rsi <= 30 ? ' rsi-green'
                  : d.rsi !== null && d.rsi >= 70 ? ' rsi-red' : '';
    el.className = 'tc' + (d.symbol === SEL ? ' sel' : '') + rsiEdge;

    // Badges de alertas técnicas
    const badges = [];
    if (d.rsi !== null && d.rsi <= 30)
      badges.push('<span class="badge badge-buy">RSI SV</span>');
    if (d.rsi !== null && d.rsi >= 70)
      badges.push('<span class="badge badge-sell">RSI SC</span>');
    if (d.macd !== null && d.macd_signal !== null && d.macd > d.macd_signal)
      badges.push('<span class="badge badge-buy">MACD ▲</span>');
    if (d.macd !== null && d.macd_signal !== null && d.macd <= d.macd_signal)
      badges.push('<span class="badge badge-sell">MACD ▼</span>');
    if (d.bb_lower && d.price_usd < d.bb_lower)
      badges.push('<span class="badge badge-buy">BB inf.</span>');
    if (d.bb_upper && d.price_usd > d.bb_upper)
      badges.push('<span class="badge badge-sell">BB sup.</span>');

    el.innerHTML = `
      <div class="tc-sym">${d.symbol}</div>
      <div class="tc-name">${d.name}</div>
      <div class="tc-price">USD ${f2(d.price_usd)}</div>
      <div class="tc-pct ${cls}">${sign}${f2(d.change_pct)}%</div>
      ${badges.length ? '<div class="tc-badges">' + badges.join('') + '</div>' : ''}
    `;
    el.onclick = () => selectTicker(d.symbol);
    grid.appendChild(el);
  });
}

// ── Detalle ───────────────────────────────────────────────────────────────────
function selectTicker(sym) {
  SEL = sym;
  if (currentView !== 'grid') switchView('grid');
  applyFilters();
  renderDetail(sym);
  const panel = document.getElementById('detail');
  panel.style.display = 'block';
  panel.scrollIntoView({behavior:'smooth', block:'nearest'});
}

function renderDetail(sym) {
  const d = MARKET[sym];
  if (!d) return;

  const up    = d.change_pct > 0, dn = d.change_pct < 0;
  const cls   = up ? 'up' : dn ? 'dn' : 'flat';
  const sign  = up ? '+' : '';
  const pColor= up ? 'var(--green)' : dn ? 'var(--red)' : 'var(--text2)';

  const ars    = Math.round(d.price_usd * CCL).toLocaleString('es-AR');
  const fmtVol = d.volume >= 1e6 ? (d.volume/1e6).toFixed(1)+'M' : (d.volume/1e3).toFixed(0)+'K';

  // Señales
  const [rsiCls, rsiLbl] = d.rsi >= 70 ? ['sig-sell','Sobrecompra'] :
                            d.rsi <= 30 ? ['sig-buy','Sobreventa']   : ['sig-neutral','Neutral'];
  const macdUp = d.macd !== null && d.macd_signal !== null && d.macd > d.macd_signal;
  const [macdCls, macdLbl] = macdUp ? ['sig-buy','Alcista'] : ['sig-sell','Bajista'];
  const aboveMA = [d.ma20, d.ma50, d.ma200].filter(m => m && d.price_usd > m).length;
  const [maCls, maLbl] = aboveMA===3 ? ['sig-buy','Por encima 3 MAs'] :
                          aboveMA===0 ? ['sig-sell','Por debajo 3 MAs'] : ['sig-neutral','Mixta'];

  // Bollinger signal
  const bbCls = d.bb_upper && d.price_usd > d.bb_upper ? 'sig-sell' :
                d.bb_lower && d.price_usd < d.bb_lower ? 'sig-buy'  : 'sig-neutral';
  const bbLbl = d.bb_upper && d.price_usd > d.bb_upper ? 'Sobre banda sup.' :
                d.bb_lower && d.price_usd < d.bb_lower ? 'Bajo banda inf.'  : 'Dentro bandas';

  const secLbl = SECTOR_LABEL[d.sector] || d.sector;

  document.getElementById('detail').innerHTML = `
    <div class="d-head">
      <div>
        <div class="d-sym">${sym}
          <span style="font-size:.9rem;font-weight:400;color:var(--text2)">${d.name}</span>
        </div>
        <div class="d-name">Sector: ${secLbl} &nbsp;·&nbsp; CEDEAR disponible en BYMA</div>
      </div>
      <div class="d-price">
        <div class="d-usd">USD ${f2(d.price_usd)}
          <span style="font-size:.95rem;color:${pColor}">${sign}${f2(d.change_pct)}%</span>
        </div>
        <div class="d-ars">≈ ARS ${ars} &nbsp;·&nbsp; TC CCL ${CCL.toFixed(0)}</div>
      </div>
    </div>

    <div class="stats">
      <div class="stat"><div class="stat-lbl">Cierre ant.</div>
        <div class="stat-val">$${f2(d.prev_close)}</div></div>
      <div class="stat"><div class="stat-lbl">Máx. día</div>
        <div class="stat-val">$${f2(d.high_day)}</div></div>
      <div class="stat"><div class="stat-lbl">Mín. día</div>
        <div class="stat-val">$${f2(d.low_day)}</div></div>
      <div class="stat"><div class="stat-lbl">Máx. 52s</div>
        <div class="stat-val">$${f2(d.high_52w)}</div></div>
      <div class="stat"><div class="stat-lbl">Mín. 52s</div>
        <div class="stat-val">$${f2(d.low_52w)}</div></div>
      <div class="stat"><div class="stat-lbl">Volumen</div>
        <div class="stat-val">${fmtVol}</div></div>
      <div class="stat"><div class="stat-lbl">ARS ref.</div>
        <div class="stat-val">${ars}</div></div>
    </div>

    <div class="chart-section">
      <div class="section-lbl">Precio · últimos 90 días</div>
      <div class="chart-wrap"><canvas id="pchart"></canvas></div>
    </div>

    <div class="section-lbl">Indicadores técnicos</div>
    <div class="ind-grid">

      <div class="ind">
        <div class="ind-lbl">RSI (14)</div>
        <div class="ind-big" style="color:${d.rsi>=70?'var(--red)':d.rsi<=30?'var(--green)':'var(--blue)'}">${d.rsi ?? '—'}</div>
        <div class="ind-bar-bg"><div class="ind-bar-fill" style="width:${d.rsi??0}%;background:${d.rsi>=70?'var(--red)':d.rsi<=30?'var(--green)':'var(--blue)'}"></div></div>
        <div style="display:flex;justify-content:space-between;font-size:.65rem;color:var(--text3);margin-bottom:6px">
          <span>0</span><span>30</span><span>70</span><span>100</span></div>
        <span class="sig ${rsiCls}">${rsiLbl}</span>
      </div>

      <div class="ind">
        <div class="ind-lbl">MACD (12/26/9)</div>
        <div class="ind-row"><span>Línea MACD</span><span>${f4(d.macd)}</span></div>
        <div class="ind-row"><span>Señal</span><span>${f4(d.macd_signal)}</span></div>
        <div class="ind-row"><span>Histograma</span>
          <span style="color:${macdUp?'var(--green)':'var(--red)'}">${f4(d.macd_hist)}</span></div>
        <div style="margin-top:8px"><span class="sig ${macdCls}">${macdLbl}</span></div>
      </div>

      <div class="ind">
        <div class="ind-lbl">Medias móviles</div>
        <div class="ind-row"><span>MA 20</span>
          <span style="color:${d.price_usd>(d.ma20??0)?'var(--green)':'var(--red)'}">${d.ma20?'$'+f2(d.ma20):'—'}</span></div>
        <div class="ind-row"><span>MA 50</span>
          <span style="color:${d.price_usd>(d.ma50??0)?'var(--green)':'var(--red)'}">${d.ma50?'$'+f2(d.ma50):'—'}</span></div>
        <div class="ind-row"><span>MA 200</span>
          <span style="color:${d.price_usd>(d.ma200??0)?'var(--green)':'var(--red)'}">${d.ma200?'$'+f2(d.ma200):'—'}</span></div>
        <div style="margin-top:8px"><span class="sig ${maCls}">${maLbl}</span></div>
      </div>

      <div class="ind">
        <div class="ind-lbl">Bandas de Bollinger (20,2)</div>
        <div class="ind-row"><span>Banda superior</span><span>${d.bb_upper?'$'+f2(d.bb_upper):'—'}</span></div>
        <div class="ind-row"><span>Media (BB)</span><span>${d.bb_mid?'$'+f2(d.bb_mid):'—'}</span></div>
        <div class="ind-row"><span>Banda inferior</span><span>${d.bb_lower?'$'+f2(d.bb_lower):'—'}</span></div>
        <div class="ind-row"><span>Precio actual</span>
          <span style="color:${pColor}">$${f2(d.price_usd)}</span></div>
        <div style="margin-top:8px"><span class="sig ${bbCls}">${bbLbl}</span></div>
      </div>

    </div>
  `;

  // Gráfico
  const ctx = document.getElementById('pchart').getContext('2d');
  if (chart) chart.destroy();
  const prices = d.hist_prices || [];
  const dates  = d.hist_dates  || [];
  const isUp   = prices.length > 1 && prices[prices.length-1] >= prices[0];
  const lc     = isUp ? '#3fb950' : '#f85149';

  chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: dates,
      datasets: [
        {
          label: 'Precio',
          data: prices,
          borderColor: lc,
          borderWidth: 1.5,
          pointRadius: 0,
          tension: 0.3,
          fill: true,
          backgroundColor: ctx2 => {
            const g = ctx2.chart.ctx.createLinearGradient(0,0,0,180);
            g.addColorStop(0, isUp ? 'rgba(63,185,80,.18)' : 'rgba(248,81,73,.18)');
            g.addColorStop(1, 'rgba(0,0,0,0)');
            return g;
          }
        },
        ...(d.bb_upper && d.bb_lower ? [
          {label:'BB Superior', data: Array(prices.length).fill(d.bb_upper),
           borderColor:'rgba(88,166,255,.4)', borderWidth:1, borderDash:[4,3],
           pointRadius:0, fill:false},
          {label:'BB Media', data: Array(prices.length).fill(d.bb_mid),
           borderColor:'rgba(88,166,255,.25)', borderWidth:1, borderDash:[2,4],
           pointRadius:0, fill:false},
          {label:'BB Inferior', data: Array(prices.length).fill(d.bb_lower),
           borderColor:'rgba(88,166,255,.4)', borderWidth:1, borderDash:[4,3],
           pointRadius:0, fill:false},
        ] : [])
      ]
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      plugins:{
        legend:{display: !!(d.bb_upper), labels:{color:'#8b949e',font:{size:10},
          boxWidth:12, padding:10}},
        tooltip:{callbacks:{label:c=>' USD '+c.parsed.y.toFixed(2)}}
      },
      scales:{
        x:{ticks:{maxTicksLimit:7,font:{size:10},color:'#484f58'},grid:{display:false}},
        y:{ticks:{font:{size:10},color:'#484f58',callback:v=>'$'+v.toFixed(0)},
           grid:{color:'rgba(255,255,255,0.04)'}}
      }
    }
  });
}

// ── Helpers ───────────────────────────────────────────────────────────────────
const f2 = v => (v !== null && v !== undefined) ? Number(v).toFixed(2) : '—';
const f4 = v => (v !== null && v !== undefined) ? Number(v).toFixed(4) : '—';

// ── Vista switching ───────────────────────────────────────────────────────────
let currentView  = 'grid';
let signalFilter = 'buy';

function switchView(view) {
  currentView = view;
  document.getElementById('view-grid').style.display    = view === 'grid'    ? '' : 'none';
  document.getElementById('view-signals').style.display = view === 'signals' ? '' : 'none';
  document.getElementById('vnav-grid').classList.toggle('active',    view === 'grid');
  document.getElementById('vnav-signals').classList.toggle('active', view === 'signals');
  if (view === 'signals') renderSignals();
}

// ── Score técnico ─────────────────────────────────────────────────────────────
function scoreOf(d) {
  let buy = 0, sell = 0;
  if (d.rsi !== null) {
    if (d.rsi <= 30) buy++; else if (d.rsi >= 70) sell++;
  }
  if (d.macd !== null && d.macd_signal !== null) {
    if (d.macd > d.macd_signal) buy++; else sell++;
  }
  const aboveMA = [d.ma20, d.ma50, d.ma200].filter(m => m && d.price_usd > m).length;
  if (aboveMA === 3) buy++; else if (aboveMA === 0) sell++;
  if (d.bb_lower && d.price_usd < d.bb_lower) buy++;
  if (d.bb_upper && d.price_usd > d.bb_upper) sell++;
  return { buy, sell, total: buy - sell };
}

// ── Pantalla de señales ────────────────────────────────────────────────────────
function filterSignals(f) {
  signalFilter = f;
  ['buy','sell','all'].forEach(x => {
    const b = document.getElementById('stab-' + x);
    b.className = 'stab' + (x === f ? (f === 'sell' ? ' active-sell' : ' active') : '');
  });
  renderSignals();
}

function renderSignals() {
  const items = Object.values(MARKET).map(d => ({ ...d, score: scoreOf(d) }));
  const filtered = items.filter(d => {
    if (signalFilter === 'buy')  return d.score.total > 0;
    if (signalFilter === 'sell') return d.score.total < 0;
    return true;
  }).sort((a, b) => {
    if (signalFilter === 'sell') return a.score.total - b.score.total;
    return b.score.total - a.score.total;
  });

  const wrap = document.getElementById('signals-table-wrap');
  if (!filtered.length) {
    wrap.innerHTML = '<p style="color:var(--text2);padding:1rem 0">Sin señales en este filtro.</p>';
    return;
  }

  const rows = filtered.map(d => {
    const s    = d.score;
    const up   = d.change_pct > 0, dn = d.change_pct < 0;
    const cls  = up ? 'up' : dn ? 'dn' : 'flat';
    const sign = up ? '+' : '';

    const indicators = [
      { label:'RSI',  buy: d.rsi !== null && d.rsi <= 30,
                       sell: d.rsi !== null && d.rsi >= 70 },
      { label:'MACD', buy:  d.macd !== null && d.macd_signal !== null && d.macd > d.macd_signal,
                       sell: d.macd !== null && d.macd_signal !== null && d.macd <= d.macd_signal },
      { label:'MAs',  buy:  [d.ma20,d.ma50,d.ma200].filter(m=>m&&d.price_usd>m).length===3,
                       sell: [d.ma20,d.ma50,d.ma200].filter(m=>m&&d.price_usd>m).length===0 },
      { label:'BB',   buy:  !!(d.bb_lower && d.price_usd < d.bb_lower),
                       sell: !!(d.bb_upper && d.price_usd > d.bb_upper) },
    ];
    const dots = indicators.map(i => {
      const dc = i.buy ? 'on-buy' : i.sell ? 'on-sell' : '';
      return `<div class="score-dot ${dc}" title="${i.label}"></div>`;
    }).join('');

    const scoreColor = s.total > 0 ? 'var(--green)' : s.total < 0 ? 'var(--red)' : 'var(--text2)';
    const scoreStr   = s.total > 0 ? '+' + s.total : String(s.total);
    const ars        = Math.round(d.price_usd * CCL).toLocaleString('es-AR');
    const rsiColor   = d.rsi >= 70 ? 'var(--red)' : d.rsi <= 30 ? 'var(--green)' : 'var(--text)';
    const macdStr    = d.macd !== null && d.macd_signal !== null
      ? (d.macd > d.macd_signal
          ? '<span style="color:var(--green)">▲ Alcista</span>'
          : '<span style="color:var(--red)">▼ Bajista</span>')
      : '—';

    return `<tr onclick="selectTicker('${d.symbol}')">
      <td><strong>${d.symbol}</strong><br>
        <span style="color:var(--text3);font-size:.68rem">${d.name}</span></td>
      <td>USD ${f2(d.price_usd)}<br>
        <span style="color:var(--text3);font-size:.68rem">ARS ${ars}</span></td>
      <td class="${cls}">${sign}${f2(d.change_pct)}%</td>
      <td style="color:${rsiColor};font-weight:600">${d.rsi ?? '—'}</td>
      <td>${macdStr}</td>
      <td><div class="score-bar">
        <div class="score-dots">${dots}</div>
        <span style="font-weight:700;color:${scoreColor}">${scoreStr}</span>
      </div></td>
    </tr>`;
  }).join('');

  wrap.innerHTML = `
    <table class="signals-table">
      <thead><tr>
        <th>Ticker</th><th>Precio</th><th>Var %</th>
        <th>RSI</th><th>MACD</th>
        <th>Score <span style="font-size:.6rem">(RSI · MACD · MAs · BB)</span></th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <p style="font-size:.68rem;color:var(--text3);margin-top:.75rem">
      Score: +1 señal de compra / −1 señal de venta. Hacé click en una fila para ver el detalle completo.
    </p>`;
}

// ── Init ──────────────────────────────────────────────────────────────────────
boot();
</script>
</body>
</html>
